formatting:
  indent_size: 4
  use_tabs: false
  braces:
    open_brace:
      before: " " 
      after: "\n"
    indent: true
    close_brace:
      before: "\n"
  operators:
    unops:
      before: ""
      after: ""
    binops:
      before: " "
      after: " "
  trailing_commas: no
  # params_per_line: null
  # max_width: null
naming:
  specifiers:
    priv_member:
      position: prefix
      value: __
      style: snake_case
  rules: 
    enforce:
      level: warning
      autocorrect: false
    vars: snake_case
    functions: camelCase
    user_types: PascalCase
    constants: SCREAMING_SNAKE_CASE
    private_members: priv_member
    private_methods: camel_Snake_Case
    namespaces: PascalCase
    internal_namespaces: Pascal_Snake_Case
    internal_functions: camel_Snake_Case
comments:
  specifiers:
    normal: //
    doc: ///
    top_level_doc: //!
  rules:
    enforce:
      level: error
    functions: doc
    file: top_level_doc
    namespaces: doc
    internal: /// No Include
newlines:
  style: lf
  final_newline: true
  collapse_blanks: true
includes:
  filepath:
    quotes: false
    relative: true
    absolute: false
    tilde_relative: true
namespaces:
  types:
    amount: 1
    enforce: warning
  